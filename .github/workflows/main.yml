name: Build TeristaSpace APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle' # Automatically caches Gradle dependencies

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Automatically installs the required components
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;29.0.13846066 cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeristaSpace-Debug
          path: app/build/outputs/apk/debug/*.apk
